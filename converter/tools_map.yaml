# tools_map.yaml — Mapeamento de tools por target CLI
# Cada tool tem uma entrada por target com type e template
# Types: mcp (Claude Code MCP), xml (OpenCode), json (Codex), implicit (no markup)

playwright.browser_navigate:
  claude:   { type: mcp, tool: "mcp__playwright__browser_navigate" }
  opencode: { type: xml, template: '<use_tool><name>browser_navigate</name><url>{{ url }}</url></use_tool>' }
  codex:    { type: json, template: '{"tool":"browser_navigate","args":{"url":"{{ url }}"}}' }

