          - rowheader "Prompt enviado" [ref=e266]
          - cell "\"me gere uma análise completa e extensa de todos os dados de vendas, estoque, clientes e produtos de 2020 a 2026, com todas as métricas possíveis\"" [ref=e267]
    - generic [ref=e268]:
      - strong [ref=e269]: "Resultado esperado:"
      - text: A IA deve responder em tempo aceitável (inferior a 2 minutos). Em consultas de escopo amplo, deve fornecer feedback de progresso informativo ou sugerir ao usuário refinamento do escopo antes de processar.
    - generic [ref=e270]:
      - strong [ref=e271]: "Resultado obtido:"
      - text: A IA retorna a resposta corretamente, porém após mais de 5 minutos. Indicadores de progresso são genéricos ("Juntando as pontas...", "Analisando tudo isso...") sem informar andamento real. Os runs automatizados falharam porque o timeout do executor (180s) é menor que o tempo de resposta.
    - generic [ref=e272]:
      - strong [ref=e273]: "Possível causa raiz:"
      - text: (1) Ausência de timeout de resposta no backend — não há limite máximo para processamento de consultas amplas. (2) Feedback de progresso insuficiente — indicadores genéricos não comunicam progresso real. (3) Ausência de sugestão de escopo — o sistema não propõe refinar a consulta quando detecta volumes elevados. (4) Sem chunking/paginação — respostas longas processadas de uma só vez.
    - generic [ref=e274]:
      - strong [ref=e275]: "Recomendações:"
      - list [ref=e276]:
        - listitem [ref=e277]: "Implementar timeout de resposta no backend (ex.: 120s) com mensagem amigável sugerindo refinar o escopo"
        - listitem [ref=e278]: Melhorar feedback de progresso — informar registros/tabelas sendo processados, etapa atual
        - listitem [ref=e279]: Sugerir refinamento de escopo quando o backend detectar consulta de volume elevado
        - listitem [ref=e280]: Implementar resposta incremental/paginação — entregar blocos parciais conforme ficam prontos
        - listitem [ref=e281]: Aumentar timeout do executor automatizado de 180s para 600s em cenários da categoria "análise extensa"
